<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Foto profil placeholder Nurmulya Dwi Atika</title>
  <desc id="desc">Ganti file ini dengan foto profil asli Anda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25c59a"/>
      <stop offset="0.52" stop-color="#2678bd"/>
      <stop offset="1" stop-color="#7657df"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="25" stdDeviation="28" flood-color="#061122" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="170" fill="url(#bg)"/>
  <circle cx="260" cy="190" r="310" fill="url(#glow)"/>
  <circle cx="400" cy="312" r="150" fill="#eef8ff" fill-opacity=".95" filter="url(#shadow)"/>
  <path d="M142 760c24-184 126-278 258-278s234 94 258 278" fill="#eef8ff" fill-opacity=".95" filter="url(#shadow)"/>
  <circle cx="650" cy="138" r="55" fill="none" stroke="#fff" stroke-opacity=".45" stroke-width="3"/>
  <path d="M606 660c56-30 95-76 119-138" fill="none" stroke="#fff" stroke-opacity=".36" stroke-width="5" stroke-linecap="round"/>
  <text x="400" y="735" text-anchor="middle" fill="#142541" font-family="Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="9">NDA</text>
